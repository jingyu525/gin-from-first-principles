services:
  # ==================== API Gateway ====================
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8088:8080"
    environment:
      # 子服务地址（本地运行时指向宿主机端口）
      - USER_SERVICE_ADDR=http://host.docker.internal:8081
      - ORDER_SERVICE_ADDR=http://host.docker.internal:8082
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - jaeger
      - prometheus
    networks:
      - gateway-net

  # ==================== 可观测性栈 ====================

  # Jaeger - 链路追踪
  jaeger:
    image: jaegertracing/all-in-one:1.53
    pull_policy: if_not_present
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # HTTP collector
    environment:
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
    networks:
      - gateway-net

  # Prometheus - 指标收集
  prometheus:
    image: prom/prometheus:v2.48.1
    pull_policy: if_not_present
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - gateway-net

  # Grafana - 指标可视化
  grafana:
    image: grafana/grafana:10.2.2
    pull_policy: if_not_present
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge

volumes:
  grafana-data:
