version: '3.8'

services:
  # User Service - 用户服务
  user-service:
    build:
      context: ./arch/user-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    networks:
      - microservices

  # Order Service - 订单服务
  order-service:
    build:
      context: ./arch/order-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    networks:
      - microservices

  # API Gateway - 网关
  gateway:
    build:
      context: ./arch/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - order-service
    networks:
      - microservices

networks:
  microservices:
    driver: bridge
